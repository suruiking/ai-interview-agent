version: "3.8"

services:
  interview:
    build: .
    container_name: ai-interview
    ports:
      - "8502:8502"
    # 环境变量（API Key 等，不进镜像）
    env_file:
      - .env
    # 以下目录挂载出来：容器删了数据还在
    volumes:
      - ./chroma_db:/app/chroma_db       # 向量库
      - ./logs:/app/logs                  # 日志
      - ./.memory:/app/.memory            # 长期记忆
      - ./data/conversations.db:/app/data/conversations.db  # 对话历史
    restart: unless-stopped               # 挂了自动重启
